# CTG Core — Corporate Deployment Stack
# Version: 1.2.0
# Architecture: Gatekeeper + internal network isolation
#
# Services: PostgreSQL, Paperclip, OpenClaw, Mission Control, Gatekeeper, n8n
# Networks: internal-net (isolated, no internet), gateway-net (internet access)

services:
  # ---------- Database ----------
  postgresql:
    image: postgres:16-alpine
    container_name: ctg-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-ctgcore}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in .env}
      POSTGRES_DB: ${PG_DB:-ctgcore}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-ctgcore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- Paperclip (Task Management + Agent Registry) ----------
  paperclip:
    image: reeoss/paperclipai-paperclip:latest
    container_name: ctg-core-paperclip
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3100"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://${PG_USER:-ctgcore}:${PG_PASSWORD}@postgresql:5432/${PG_DB:-ctgcore}"
      SERVE_UI: "true"
      DEPLOYMENT_MODE: "local_trusted"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-ctg-core-paperclip-secret}
    ports:
      - "${PAPERCLIP_PORT:-13100}:3100"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- OpenClaw (Gateway + Agents) ----------
  openclaw:
    image: ghcr.io/ccubillas21/ctg-openclaw:${CTG_VERSION:-latest}
    container_name: ctg-core-openclaw
    restart: unless-stopped
    environment:
      NODE_ENV: production
      OPENCLAW_PORT: "18789"
      OPENCLAW_BIND: "0.0.0.0"
      ANTHROPIC_API_KEY: "sk-ant-placeholder-routed-through-gatekeeper"
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN:-}
      PAPERCLIP_API_URL: "http://paperclip:3100"
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      COMPANY_ID: ${COMPANY_ID:-}
      GATEKEEPER_INTERNAL_TOKEN: ${GATEKEEPER_INTERNAL_TOKEN:-}
    ports:
      - "${GW_PORT:-28789}:18789"
    volumes:
      - openclaw-data:/home/node/.openclaw/workspace
      - openclaw-config:/home/node/.openclaw
    depends_on:
      paperclip:
        condition: service_healthy
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18789/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- Mission Control (Dashboard) ----------
  mission-control:
    image: node:22-alpine
    container_name: ctg-core-mc
    restart: unless-stopped
    working_dir: /app
    command: ["npx", "@openclaw/mission-control", "--port", "4000"]
    environment:
      NODE_ENV: production
      PORT: "4000"
      PAPERCLIP_URL: "http://paperclip:3100"
    ports:
      - "${MC_PORT:-14000}:4000"
    depends_on:
      paperclip:
        condition: service_healthy
    networks:
      - internal-net
      - gateway-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- Gatekeeper (LLM Proxy + Content Sanitizer + Usage Ledger) ----------
  gatekeeper:
    image: ghcr.io/ccubillas21/ctg-gatekeeper:${CTG_VERSION:-latest}
    container_name: ctg-core-gatekeeper
    restart: unless-stopped
    environment:
      GATEKEEPER_PORT: "9090"
      GATEKEEPER_INTERNAL_TOKEN: ${GATEKEEPER_INTERNAL_TOKEN:-}
      GATEKEEPER_DB_PATH: /data/gatekeeper.db
      GATEKEEPER_PRICING_PATH: /data/pricing.json
      GATEKEEPER_DOMAIN_ALLOWLIST: ${GATEKEEPER_DOMAIN_ALLOWLIST:-*}
      LICENSE_GRACE_HOURS: ${LICENSE_GRACE_HOURS:-72}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      COMPANY_ID: ${COMPANY_ID:-}
      PARENT_HUB_URL: ${PARENT_HUB_URL:-}
      PARENT_HUB_TOKEN: ${PARENT_HUB_TOKEN:-}
      CHECKIN_INTERVAL_MS: ${CHECKIN_INTERVAL_MS:-300000}
      OPENCLAW_URL: "http://openclaw:18789"
      PAPERCLIP_URL: "http://paperclip:3100"
      N8N_URL: "http://n8n:5678"
    ports:
      - "${GATEKEEPER_HOST_PORT:-19090}:9090"
    volumes:
      - gatekeeper-data:/data
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - internal-net
      - gateway-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- n8n (Credential Isolation + Workflow Automation) ----------
  n8n:
    image: n8nio/n8n:1.76.1
    container_name: ctg-core-n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-default-change-me}
      WEBHOOK_URL: "http://localhost:${N8N_PORT:-5678}/"
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - internal-net
      - gateway-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  openclaw-data:
  openclaw-config:
  gatekeeper-data:
  n8n-data:

networks:
  internal-net:
    driver: bridge
    internal: true
  gateway-net:
    driver: bridge
